<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08080e">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=15">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-98KDVDFBCW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-98KDVDFBCW');
  </script>
  <script src="/js/prices.js" defer></script>
  <script src="/js/theme.js" defer></script>
  <title>Signal vs. The Street — The Signal</title>
  <style>
    .svs-page { max-width:1000px; margin:0 auto; padding:40px 24px; }
    .svs-title { font-family:'Anton',sans-serif; font-size:3rem; margin-bottom:8px; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .svs-subtitle { color:var(--text-secondary); font-size:1.1rem; margin-bottom:40px; max-width:600px; }
    .svs-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:20px; margin-bottom:40px; }
    .svs-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; }
    .svs-card-label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px; }
    .svs-card-return { font-family:'JetBrains Mono',monospace; font-size:2rem; font-weight:700; color:var(--green); }
    .svs-card-vs { font-size:13px; margin-top:8px; color:var(--text-secondary); }
    .svs-card-vs span { font-family:'JetBrains Mono',monospace; }
    .svs-holdings { margin-top:40px; }
    .svs-holdings-title { font-size:1.4rem; font-weight:700; margin-bottom:16px; }
    .svs-table { width:100%; border-collapse:collapse; }
    .svs-table th { text-align:left; padding:10px 12px; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); border-bottom:1px solid var(--border); }
    .svs-table td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,0.04); font-family:'JetBrains Mono',monospace; font-size:13px; }
    .svs-positive { color:var(--green); }
    .svs-negative { color:var(--red); }
    .svs-footer { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); color:var(--text-muted); font-size:12px; }
  </style>
</head>
<body class="dark">
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo"><img src="/img/logo-hex.jpg" alt="The Signal" class="logo-img"><span class="logo-text"><span class="logo-the">THE</span> <strong>SIGNAL</strong></span></a>
      <div class="nav-actions">
        <button class="nav-btn search-btn" id="searchToggle" aria-label="Search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="nav-btn hamburger-btn" id="hamburgerToggle" aria-label="Menu">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Kratos-Inspired Drawer Menu -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <button class="drawer-close" id="drawerClose" aria-label="Close menu">✕</button>
      <a href="/" class="drawer-logo">
        <img src="/img/logo-hex.jpg" alt="The Signal" class="drawer-logo-img">
        <span class="drawer-logo-text">SIGNAL</span>
      </a>
    </div>
    <div class="drawer-body">
      <div class="drawer-section-label">SECTORS</div>
      <a href="/sector/ai" class="drawer-link">AI</a>
      <a href="/sector/cyber" class="drawer-link">Cyber</a>
      <a href="/sector/defense" class="drawer-link">Defense</a>
      <a href="/sector/space" class="drawer-link">Space</a>
      <a href="/sector/mega-cap" class="drawer-link">Mega-Cap</a>
      <a href="/sector/quantum" class="drawer-link">Quantum</a>
      <hr class="drawer-divider">
      <div class="drawer-section-label">FEATURES</div>
      <a href="/hive" class="drawer-link drawer-link-hive">Hive</a>
      <a href="/signal-vs-the-street" class="drawer-link drawer-link-svs">Signal vs. Street</a>
    </div>
  </div>

  <main>
    <div class="svs-page">
      <h1 class="svs-title">Signal vs. The Street</h1>
      <p class="svs-subtitle">Our live portfolio performance. Track every position, every return, measured against the S&P 500 and Nasdaq.</p>
      <div class="svs-grid" id="svsCards"></div>
      <div class="svs-holdings">
        <h2 class="svs-holdings-title">Holdings</h2>
        <table class="svs-table" id="svsTable"><thead><tr><th>Ticker</th><th>Weight</th><th>Return</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="svs-footer" id="svsFooter"></div>
    </div>
  </main>
  <script>
  fetch('/data/portfolio-returns.json').then(r=>r.json()).then(d=>{
    var cards='';
    for(var k in d.periods){
      var p=d.periods[k];
      cards+='<div class="svs-card"><div class="svs-card-label">'+p.label+'</div><div class="svs-card-return">+'+p.portfolioReturn.toFixed(1)+'%</div><div class="svs-card-vs">vs SPY <span>+'+p.spyReturn.toFixed(1)+'%</span> ('+(p.vsSPY>=0?'▲':'▼')+' '+Math.abs(p.vsSPY).toFixed(1)+'%)</div><div class="svs-card-vs">vs QQQ <span>+'+p.qqqReturn.toFixed(1)+'%</span> ('+(p.vsQQQ>=0?'▲':'▼')+' '+Math.abs(p.vsQQQ).toFixed(1)+'%)</div></div>';
    }
    document.getElementById('svsCards').innerHTML=cards;
    var rows='';
    (d.holdings||[]).forEach(function(h){
      var ret=h.return!==null?'+'+h.return.toFixed(1)+'%':'—';
      var cls=h.return>0?'svs-positive':h.return<0?'svs-negative':'';
      rows+='<tr><td>'+h.ticker+'</td><td>'+h.weight.toFixed(1)+'%</td><td class="'+cls+'">'+ret+'</td></tr>';
    });
    document.querySelector('#svsTable tbody').innerHTML=rows;
    document.getElementById('svsFooter').innerHTML='Data as of '+new Date(d.lastUpdated).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'. Past performance does not guarantee future results.';
  }).catch(function(){
    document.getElementById('svsCards').innerHTML='<p style="color:var(--text-muted)">Portfolio data loading...</p>';
  });
  </script>
  <script>
  document.addEventListener('DOMContentLoaded', function(){
    var btn = document.getElementById('hamburgerToggle');
    var drawer = document.getElementById('drawer');
    var overlay = document.getElementById('drawerOverlay');
    var closeBtn = document.getElementById('drawerClose');
    function openDrawer() {
      drawer.classList.add('open');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      drawer.classList.remove('open');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }
    if (btn && drawer && overlay) {
      btn.addEventListener('click', function(){ openDrawer(); });
      overlay.addEventListener('click', function(){ closeDrawer(); });
      if (closeBtn) closeBtn.addEventListener('click', function(){ closeDrawer(); });
      // Close on Escape key
      document.addEventListener('keydown', function(e){
        if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
      });
      // Close on link click inside drawer
      drawer.querySelectorAll('a').forEach(function(a){
        a.addEventListener('click', function(){ closeDrawer(); });
      });
    }
  });
  </script>
</body>
</html>
